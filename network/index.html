<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>P2P 4人聊天室</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 20px auto; }
    #logArea { 
      height: 400px; overflow-y: auto; background: #1e1e1e; color: #d4d4d4; 
      padding: 10px; margin-bottom: 10px; border-radius: 5px; line-height: 1.5;
    }
    .system { color: #569cd6; }
    .error { color: #f44747; }
    #chatControls { display: flex; gap: 10px; }
    #chatInput { flex-grow: 1; padding: 5px; }
  </style>
</head>
<body>
  <h2>Trystero x Pyodide 聊天室 (4人滿房)</h2>
  
  <div id="logArea"></div>
  
  <div id="chatControls">
    <input type="text" id="chatInput" placeholder="等待房間滿員..." disabled>
    <button id="sendBtn" disabled>傳送</button>
  </div>

  <script type="module">
    import { initNetwork, setPythonReady } from './network.js';

    // 建立全域 Log 函式
    const logArea = document.getElementById('logArea');
    window.appendLog = (msg, type = '') => {
      const div = document.createElement('div');
      div.textContent = msg;
      if (type) div.className = type;
      logArea.appendChild(div);
      logArea.scrollTop = logArea.scrollHeight; // 自動捲動到底部
    };
    window.js_append_log = window.appendLog;

    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    // 載入 Pyodide 並掛載檔案
    async function initPyodideAndGame(myId, playerList) {
      window.appendLog("[系統] 正在啟動 Python 核心...", "system");
      window.pyodide = await loadPyodide();
      
      window.appendLog("[系統] 正在掛載 Python 模組...", "system");
      
      // 🌟 關鍵修正：動態抓取 .py 檔案並寫入 Pyodide 的虛擬檔案系統
      try {
        const filesToLoad = ['network.py', 'example.py'];
        for (const fileName of filesToLoad) {
          // 確保這些 .py 檔案跟你的 index.html 放在同一個目錄下
          const response = await fetch(`./${fileName}`);
          if (!response.ok) throw new Error(`無法載入 ${fileName}`);
          const codeText = await response.text();
          
          // 將字串寫入虛擬系統根目錄
          window.pyodide.FS.writeFile(fileName, codeText);
          console.log(`[JS] 成功掛載 ${fileName}`);
        }
      } catch (error) {
        window.appendLog(`[錯誤] 掛載檔案失敗: ${error.message}`, "error");
        return;
      }

      // 檔案掛載完成後，現在可以安全地 import 了
      await window.pyodide.runPythonAsync(`
    import sys
    import network
    import example
      `);

      setPythonReady();
      window.appendLog("[系統] Python 模組掛載完成，啟動聊天室！", "system");

      // 將 JS 陣列轉為 Python List 並啟動聊天迴圈
      const pyPlayerList = window.pyodide.toPy(playerList);
      window.pyodide.globals.get('example').start_demo(myId, pyPlayerList);

      // 解鎖聊天 UI
      chatInput.disabled = false;
      sendBtn.disabled = false;
      chatInput.placeholder = "輸入訊息...";
      chatInput.focus();
    }

    // 發送聊天訊息的事件綁定
    function handleSend() {
      const text = chatInput.value.trim();
      if (text && window.pyodide) {
        window.pyodide.globals.get('example').send_chat_message(text);
        chatInput.value = '';
      }
    }
    
    sendBtn.addEventListener('click', handleSend);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    // 網路層會呼叫這個回呼，告訴我們房間滿了
    window.onRoomFull = (myId, playerList) => {
      // 避免重複載入 Pyodide，如果已經載入過就直接掛載 Python 腳本
      if (!window.pyodide) {
        initPyodideAndGame(myId, playerList);
      } else {
        window.pyodide.globals.get('example').start_demo(myId, window.pyodide.toPy(playerList));
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.placeholder = "輸入訊息...";
        chatInput.focus();
      }
    };

    // 🌟 新增：網路層通知房間解散
    window.onRoomDisband = () => {
      // 鎖定 UI
      chatInput.disabled = true;
      sendBtn.disabled = true;
      chatInput.placeholder = "等待房間滿員...";
      
      // 呼叫 Python 清理舊任務
      if (window.pyodide && window.pyodide.globals.get('example')) {
        window.pyodide.globals.get('example').stop_demo();
      }
    };

    // 啟動網路配對
    initNetwork('my-4-player-app');
  </script>
</body>
</html>
